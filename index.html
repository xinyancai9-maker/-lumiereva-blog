<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lumiereva · 日记与沉思</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#faf8f5;--bg2:#f5f2ed;--text:#3d3d3d;--text2:#888;--accent:#d4a373;--pink:#ffe5ec;--dot:#e8d5c4;--white:#fff;--shadow:rgba(0,0,0,0.04);--border:#e8e4de}
    [data-theme="dark"]{--bg:#1a1a1a;--bg2:#252525;--text:#e0e0e0;--text2:#888;--accent:#d4a373;--pink:#3d3538;--dot:#3d3d3d;--white:#2a2a2a;--shadow:rgba(0,0,0,0.3);--border:#3d3d3d}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Zen Maru Gothic',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.8;
      min-height:100vh;
      background-image:radial-gradient(var(--dot)1px,transparent 1px);
      background-size:24px 24px;
      transition:background .3s,color .3s;
      position:relative;
      overflow-x:hidden;
    }
    /* 飘落花瓣 canvas */
    #petal-canvas{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0;
    }
    /* 确保内容在canvas上层 */
    header, main, footer{
      position:relative;
      z-index:10;
    }
    a{color:inherit;text-decoration:none}
    header{position:fixed;top:0;left:0;right:0;background:rgba(250,248,245,.9);backdrop-filter:blur(12px);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:100;border-bottom:1px solid var(--border);transition:background .3s}
    [data-theme="dark"] header{background:rgba(26,26,26,.9)}
    .logo{font-size:1.5rem;font-weight:400;letter-spacing:.15em;cursor:pointer}
    .logo span{color:var(--accent)}
    nav{display:flex;align-items:center;gap:1.5rem}
    nav a{font-size:.9rem;transition:color .3s;cursor:pointer}
    nav a:hover{color:var(--accent)}
    .theme-toggle{cursor:pointer;font-size:1.2rem;padding:.3rem;border-radius:8px;transition:background .3s}
    .theme-toggle:hover{background:var(--pink)}
    /* 主内容初始隐藏，由弹窗控制显示 */
    #main-content{
      display: none;
    }
    main{max-width:800px;margin:0 auto;padding:8rem 2rem 4rem}
    .hero{text-align:center;margin-bottom:2rem;padding:3rem 1rem;background:var(--white);border-radius:24px;box-shadow:0 4px 24px var(--shadow)}
    .hero-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#e8d5c4);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
    .hero h1{font-size:2rem;font-weight:300;letter-spacing:.2em;margin-bottom:.5rem}
    .hero p{color:var(--text2);font-size:.9rem;letter-spacing:.1em}
    .social-links{display:flex;justify-content:center;gap:1rem;margin-top:1.5rem}
    .social-links a{width:40px;height:40px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform .3s,background .3s}
    .social-links a:hover{transform:translateY(-3px);background:var(--pink)}
    /* 搜索框样式 */
    .search-wrapper{
      max-width:400px;
      margin:1.5rem auto 1rem;
      position:relative;
    }
    .search-icon{
      position:absolute;
      left:1.2rem;
      top:50%;
      transform:translateY(-50%);
      font-size:1rem;
      opacity:0.6;
      pointer-events:none;
      color:var(--text2);
    }
    .search-input{
      width:100%;
      padding:0.9rem 1.2rem 0.9rem 3rem;
      border-radius:40px;
      border:1px solid var(--border);
      background:var(--white);
      font-family:'Zen Maru Gothic',sans-serif;
      font-size:0.95rem;
      color:var(--text);
      outline:none;
      transition:box-shadow 0.2s, border-color 0.2s;
      box-shadow:0 2px 8px var(--shadow);
    }
    .search-input:focus{
      border-color:var(--accent);
      box-shadow:0 4px 16px rgba(212,163,115,0.2);
    }
    .search-clear{
      position:absolute;
      right:1rem;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      font-size:1.1rem;
      cursor:pointer;
      color:var(--text2);
      padding:0.2rem 0.5rem;
      border-radius:50%;
      transition:background 0.2s;
      line-height:1;
    }
    .search-clear:hover{
      background:var(--pink);
      color:var(--accent);
    }
    .tags-filter{display:flex;flex-wrap:wrap;gap:.5rem;margin:1.5rem 0 2rem;justify-content:center}
    .tag-filter{padding:.4rem 1rem;border-radius:20px;background:var(--bg2);font-size:.8rem;cursor:pointer;transition:all .3s;border:1px solid transparent}
    .tag-filter:hover,.tag-filter.active{background:var(--pink);border-color:var(--accent)}
    .posts{display:flex;flex-direction:column;gap:2rem}
    .post-card{background:var(--white);border-radius:20px;padding:2rem;box-shadow:0 2px 20px var(--shadow);transition:transform .3s,box-shadow .3s;display:block;cursor:pointer}
    .post-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .post-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
    .post-date{font-size:.8rem;color:var(--text2);letter-spacing:.1em}
    .post-tags{display:flex;gap:.5rem}
    .post-tag{font-size:.7rem;padding:.2rem .6rem;border-radius:12px;background:var(--bg2);color:var(--text2)}
    .post-title{font-size:1.4rem;font-weight:400;margin-bottom:.75rem;line-height:1.4}
    .post-excerpt{color:var(--text2);font-size:.95rem;line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;word-break:break-word}
    .archive-link{text-align:center;margin-top:3rem}
    .archive-link a{display:inline-block;padding:.75rem 2rem;border-radius:30px;background:var(--white);color:var(--text);box-shadow:0 2px 12px var(--shadow);transition:all .3s;cursor:pointer}
    .archive-link a:hover{transform:translateY(-2px);box-shadow:0 4px 20px var(--shadow)}
    footer{text-align:center;padding:3rem;color:var(--text2);font-size:.85rem;position:relative;z-index:10}
    footer a{color:var(--accent);cursor:pointer}
    .page{display:none}
    .page.active{display:block}
    /* 详情页专用样式 */
    .detail-image-container{
      width:100%;
      margin-bottom:2rem;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 4px 20px var(--shadow);
    }
    .detail-image-container img{
      width:100%;
      height:auto;
      display:block;
    }
    .back-btn{
      background:none;
      border:none;
      color:var(--accent);
      font-size:0.95rem;
      cursor:pointer;
      margin-bottom:1.5rem;
      display:inline-block;
      padding:0.3rem 1rem 0.3rem 0.5rem;
      border-radius:30px;
      transition:background .3s;
    }
    .back-btn:hover{
      background:var(--pink);
    }
    #detail-content{
      -webkit-line-clamp:unset;
      display:block;
      color:var(--text);
      white-space:pre-line;
    }
    /* 阅读时间样式 */
    .reading-time{
      font-size:0.8rem;
      color:var(--text2);
      margin-top:0.5rem;
      margin-bottom:1rem;
      text-align:right;
      border-bottom:1px dashed var(--border);
      padding-bottom:0.5rem;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .post-card{animation:fadeIn .4s ease-out}

    /* ----- 高级昵称弹窗样式 (淡粉色打字机) ----- */
    #nickname-overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1000;
      transition:opacity 0.5s ease;
    }
    .nickname-modal{
      background:var(--white);
      max-width:420px;
      width:90%;
      padding:2.5rem 2rem;
      border-radius:32px;
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
      text-align:center;
      border:1px solid rgba(255,255,255,0.2);
      animation:modalFloatIn 0.5s ease-out;
    }
    @keyframes modalFloatIn{
      0%{opacity:0;transform:translateY(20px) scale(0.98);}
      100%{opacity:1;transform:translateY(0) scale(1);}
    }
    .nickname-modal h2{
      font-size:1.8rem;
      font-weight:300;
      letter-spacing:0.1em;
      margin-bottom:1rem;
      color:var(--accent);
    }
    .nickname-modal p{
      font-size:0.95rem;
      color:var(--text2);
      margin-bottom:2rem;
      line-height:1.6;
    }
    .nickname-input{
      width:100%;
      padding:1rem 1.2rem;
      border-radius:60px;
      border:1px solid var(--border);
      background:var(--bg2);
      font-family:'Zen Maru Gothic',sans-serif;
      font-size:1rem;
      color:var(--text);
      outline:none;
      transition:box-shadow 0.2s, border-color 0.2s;
      margin-bottom:1.5rem;
      text-align:center;
    }
    .nickname-input:focus{
      border-color:var(--accent);
      box-shadow:0 4px 16px rgba(212,163,115,0.25);
    }
    .nickname-btn{
      background:var(--accent);
      color:white;
      border:none;
      padding:0.9rem 2rem;
      border-radius:60px;
      font-size:1rem;
      font-weight:500;
      letter-spacing:0.1em;
      cursor:pointer;
      transition:transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow:0 8px 20px rgba(212,163,115,0.3);
      width:100%;
    }
    .nickname-btn:hover{
      background:#c38e5a;
      transform:translateY(-2px);
      box-shadow:0 12px 28px rgba(212,163,115,0.4);
    }
    /* 欢迎语区域：淡粉色，大字 */
    .nickname-greeting {
      font-size: 3rem;
      color: #f8a5a5; /* 淡粉色 */
      font-weight: 300;
      line-height: 1.2;
      min-height: 6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .nickname-greeting #greeting-main {
      display: inline-block;
      font-weight: 350;
      letter-spacing: 0.02em;
    }
    .nickname-greeting small {
      font-size: 1.2rem;
      color: var(--text2);
      display: block;
      margin-top: 1rem;
      font-weight: 300;
      opacity: 0.8;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 0.8; transform: translateY(0); }
    }
    [data-theme="dark"] .nickname-greeting {
      color: #f2a2a2; /* 深色模式下保持可见的淡粉 */
    }
    [data-theme="dark"] .nickname-greeting small {
      color: #aaa;
    }
    .hidden{
      display:none !important;
    }

    /* ----- 回到顶部按钮 (右下角) ----- */
    #back-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      visibility: hidden;
      z-index: 999;
      color: var(--accent);
      font-size: 1.4rem;
      line-height: 1;
    }
    #back-to-top.show {
      opacity: 0.9;
      visibility: visible;
    }
    #back-to-top:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(212,163,115,0.3);
      background: var(--pink);
    }

    /* ----- 归档日历样式 ----- */
    .calendar-wrapper {
      background: var(--white);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 16px var(--shadow);
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 400;
    }
    .calendar-nav {
      display: flex;
      gap: 1rem;
    }
    .calendar-nav span {
      cursor: pointer;
      color: var(--accent);
      font-size: 1.2rem;
      transition: transform 0.2s;
    }
    .calendar-nav span:hover {
      transform: scale(1.2);
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-day {
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      background: var(--bg2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }
    .calendar-day.empty {
      background: transparent;
      cursor: default;
    }
    .calendar-day.has-posts {
      background: var(--pink);
      color: var(--accent);
      font-weight: 500;
      border: 1px solid var(--accent);
    }
    .calendar-day.has-posts:hover,
    .calendar-day.selected {
      background: var(--accent);
      color: white;
    }
    .calendar-day:not(.empty):hover {
      background: var(--accent);
      color: white;
    }
    .clear-date-btn {
      display: inline-block;
      margin: 0.5rem 0 1rem;
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .clear-date-btn:hover {
      color: #c38e5a;
    }

    /* ----- 设置页面卡片样式 ----- */
    .settings-card {
      background: var(--white);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 16px var(--shadow);
    }
    .settings-card h3 {
      font-size: 1.4rem;
      font-weight: 300;
      margin-bottom: 1.5rem;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
    }
    .lang-switch {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }
    .lang-btn {
      padding: 0.6rem 2rem;
      border-radius: 40px;
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .lang-btn.active {
      background: var(--pink);
      border-color: var(--accent);
      color: var(--accent);
    }
    .lang-btn:hover {
      background: var(--pink);
    }
    /* 留言板样式 */
    .guestbook-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .guestbook-input, .guestbook-textarea {
      padding: 0.8rem 1rem;
      border-radius: 30px;
      border: 1px solid var(--border);
      background: var(--bg2);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
    }
    .guestbook-textarea {
      border-radius: 20px;
      resize: vertical;
    }
    .guestbook-submit {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 1rem;
    }
    .guestbook-submit:hover {
      background: #c38e5a;
    }
    .guestbook-list {
      max-height: 300px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .guestbook-item {
      background: var(--bg2);
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .guestbook-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }
    .guestbook-name {
      font-weight: 500;
      color: var(--accent);
    }
    .guestbook-content {
      line-height: 1.6;
    }
    .clear-guestbook {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }
    /* 简介卡片 */
    .profile-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .profile-text {
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <!-- 飘落花瓣 canvas (动态元素) -->
  <canvas id="petal-canvas"></canvas>

  <!-- 昵称弹窗 (始终存在，通过JS控制显示/隐藏) -->
  <div id="nickname-overlay">
    <div class="nickname-modal" id="nickname-modal-card">
      <!-- 初始状态：提问 + 输入框 + 按钮 -->
      <div id="modal-ask">
        <h2>✨ 我应该怎么称呼你？</h2>
        <p>What should I call you?</p>
        <input type="text" id="nickname-input-field" class="nickname-input" placeholder="你的名字 / Your name" autofocus>
        <button class="nickname-btn" id="nickname-submit">开始 / Enter</button>
      </div>
      <!-- 欢迎状态：隐藏上述，显示打字机欢迎语 (淡粉色大字) -->
      <div id="modal-greeting" class="hidden">
        <div class="nickname-greeting">
          <span id="greeting-main"></span>
          <small id="greeting-small" style="display: none;">欢迎</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 回到顶部按钮 -->
  <div id="back-to-top" title="回到顶部">↑</div>

  <!-- 主内容（初始隐藏） -->
  <div id="main-content">
    <header>
      <a class="logo" onclick="showPage('home')">lumiere<span>va</span></a>
      <nav>
        <a onclick="showPage('home')" id="nav-home">首页</a>
        <a onclick="showPage('archive')" id="nav-archive">归档</a>
        <a onclick="showPage('settings')" id="nav-settings">设置</a>
        <span class="theme-toggle" onclick="toggleTheme()">🌙</span>
      </nav>
    </header>
    <main>
      <!-- 首页 -->
      <div id="home" class="page active">
        <div class="hero">
          <div class="hero-avatar">✨</div>
          <h1>lumiereva</h1>
          <p id="hero-subtitle">记录生活的闪光时刻</p>
          <div class="social-links">
            <!-- 修改第一个链接：点击🐙进入小红书 -->
            <a href="https://xhslink.com/m/2kP724GH30a" target="_blank" title="小红书">🐙</a>
            <a href="#" target="_blank" title="Twitter">🐦</a>
            <a href="mailto:hello@lumiereva.com" title="Email">✉️</a>
          </div>
        </div>
        <!-- 首页搜索框 -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-home" placeholder="搜索文章...">
          <button class="search-clear" id="clear-home" style="display:none;">✕</button>
        </div>
        <div class="tags-filter" id="tagsFilter"></div>
        <div class="posts" id="posts"></div>
        <div class="archive-link">
          <a onclick="showPage('archive')" id="view-all">📅 查看全部文章</a>
        </div>
      </div>
      <!-- 归档页 -->
      <div id="archive" class="page">
        <h2 style="text-align:center;margin-bottom:2rem;font-weight:300;letter-spacing:.1em" id="archive-title">📚 所有文章</h2>
        <!-- 归档日历容器 -->
        <div id="calendar-container" class="calendar-wrapper"></div>
        <!-- 清除日期筛选按钮（隐藏） -->
        <div id="clear-date-btn" class="clear-date-btn" style="display:none;" onclick="clearDateFilter()">✕ 清除日期筛选</div>
        <!-- 归档搜索框 -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-archive" placeholder="搜索文章...">
          <button class="search-clear" id="clear-archive" style="display:none;">✕</button>
        </div>
        <div class="posts" id="archivePosts"></div>
        <div style="text-align:center;margin-top:2rem">
          <a onclick="showPage('home')" id="back-home">← 返回首页</a>
        </div>
      </div>

说爱人如养花，最好的爱从来都不是把你修剪成我喜欢的样子，而是用心浇灌，给足你阳光和包容，让你顺着自己的脉络，长出最自在、最鲜活的模样。我们一起，在爱里好好生长，彼此滋养，互相成就。\n\n我也知道，这样的老派与执着，在这个凡事都要快、都要效率的世界里，多少有点不合时宜，带着点笨拙的固执，甚至会被人笑一句“跟不上时代”。\n\n但此刻，请允许我在信纸的背面，画满消失的海岸线。画涨潮时漫过脚踝的软浪，画被潮水磨平了棱角的礁石，画沙滩上被浪一冲就散的脚印，就像我藏在字里行间，那些没说出口的忐忑与执念，那些怕被人笑的、不合时宜的深情。\n等晨光舔舐窗棂的时候，这些歪歪扭扭的字迹，会像我们只属于彼此的秘密一样悄悄蒸发，只在空气里，留下一点海水的咸，和藏不住的、淡淡的苦涩。\n你知道的，我永远学不会笔直地爱人。学不会用套路和捷径换一场短暂的心动，学不会在感情里权衡利弊、收放自如。就像潮水永远学不会避开礁石，只会一次次义无反顾地扑上去，哪怕碎成漫天的浪花，也还是要带着满心的温柔，撞向它认定的岸。\n可就算是这样，我还是会等。等墨水在纸上晕开深蓝，等字迹在岁月里繁殖出整片海，等一个愿意慢下来的人。他能接住我的笨拙，读懂我的老派，愿意陪我走很长很长的、慢悠悠的路，愿意认认真真，看见完整的我。\n\n我这样一个老派的人，始终还是相信，细水长流的偏爱，最动人心；慢慢来的诚意，最能抵得过岁月漫长。"

        excerpt: "看完了某人给我分享的短片，当一个行为被置于市场的目光之下，它的性质就会发生根本改变。原本纯粹的情感关系，一旦被资本凝视，就会不可逆转地变成利益关系。就像那个男孩，他最初的爱是真的，但当他开始计算珍珠的价值，爱情就悄然变质了。他依然爱女孩，但这种爱已经掺杂了期待，期待她悲伤，期待她流泪，期待她为自己生产珍珠。\n\n在现实生活中，我们何尝不生活在各种凝视之下？消费主义的凝视让我们把幸福等同于购物，成功学的凝视让我们把价值等同于成就，社交媒体的凝视让我们把存在等同于点赞。这些凝视就像无形的当铺老板，时刻评估着我们的一切，将我们的情感、关系、甚至梦想都换算成某种可量化的指标。\n\n很多时候爱的媒介取代了爱本身。\n\n男孩最初收集珍珠，是为了留住女孩的悲伤痕迹，这是一种浪漫的举动。但当珍珠有了市场价值，他的注意力就逐渐从“女孩的悲伤”转向了“珍珠的价值”。他不再关心女孩为何哭泣，只关心她能否哭泣；不再想安慰她的痛苦，只想要获取痛苦的产品。在这个过程中，珍珠原本只是爱的媒介，逐渐取代了爱本身，成了他追求的目标。\n\n这正是消费社会中爱情的普遍困境。我们为爱人买礼物，但渐渐忘记了礼物只是爱的表达，而开始用礼物的贵贱衡量爱的深浅。我们为爱情创造各种仪式，但渐渐忘记了仪式只是爱的形式，而开始用仪式的隆重程度判断爱的真伪。媒介取代了本质，形式吞噬了内容，我们拥有了满屋子的珍珠，却失去了流泪的那个人的心。\n\n真正的爱应该是无条件的，我爱你，不是因为你能给我什么，而是因为你就是你。但资本逻辑的本质恰恰是有条件的交换，我给你珍珠，你给我眼泪；我给你财富，你给我情感。\n当男孩开始用珍珠换取财富，他就无形中将这种交换逻辑带入了爱情。他的爱开始有了条件：你需要持续流泪，需要持续生产珍珠，需要持续为我提供价值。这不是有意的算计，而是潜移默化的侵蚀，当市场逻辑成为我们理解世界的主要方式，它就会悄悄渗透到最私密的领域，将无条件的爱改造成有条件的交换。\n在正常的逻辑中，爱情是目的，财富是手段，我们获取财富，是为了更好地相爱。但在资本逻辑的裹挟下，这种关系常常被颠倒：财富变成了目的，爱情沦为了手段。男孩开始期望女孩流泪，不是因为她的悲伤触动了他，而是因为她的眼泪能带来财富。爱情成了生产财富的工具，成了获取利益的途径。\n我认为这种颠倒很隐蔽，以至于当事人常常浑然不觉。男孩依然认为自己深爱女孩，依然会为她的悲伤心疼，但这份心疼已经混入了期待，期待这份悲伤能转化为珍珠，期待这些珍珠能换取财富。他的爱不再是纯粹的情感，而成了复杂的情感混合物，其中爱与利益纠缠不清难以分辨。\n女孩在整个故事中几乎不说话，只是流泪。她被观看、被评估、被索取，却始终保持沉默。这种沉默可以理解为无力反抗的被动，但也可以理解为一种拒绝被完全定义的态度——无论你们如何评估我的眼泪，无论这些眼泪变成什么商品，我依然是我，依然感受着自己的悲伤，依然保持着自己的情感内核。\n对那个男孩来说，出路或许不在于停止收集珍珠，也不在于拒绝当铺老板的收购，而在于重新觉察自己的情感，那么他到底爱女孩什么？是爱她能生产珍珠的能力，还是爱她作为人的整体存在？他收集珍珠是为了保存她的痕迹，还是为了换取财富？当他能够诚实地面对这些问题，能够区分自己的真实情感和被资本塑造的欲望，他就有可能找回爱的本真性。\n\n我们在现实中的启示也是如此。我们无法逃离市场，无法完全避开资本的凝视，无法不让自己的情感被量化、被评估。但我们可以在这些外部力量面前保持一种内在的觉察，知道什么是自己真实的需要，什么是被外部塑造的欲望；知道什么是真正让自己快乐的，什么是被消费主义定义为快乐的。\n\n我觉得我们应该坚持在资本异化中重建人与人的真实联结。\n\n看完这部短片，我观察到男孩、女孩和当铺老板被困在一个无法解脱的循环中：女孩不断流泪，男孩不断索取，当铺老板不断收购。每个人都按照自己被设定的角色行动，每个人都无法跳出这个结构。\n但现实中的我们或许还有另一种可能，那就是在承认异化无法完全消除的前提下，努力重建人与人之间的真实联结。\n我们需要认识到珍珠只是珍珠，不是幸福的保证，财富只是财富，不是爱情的基础。当铺老板给出的价格，只是市场的一时评估，不代表任何终极价值。我们需要学会用“祛魅”的眼光看待各种估值体系，看到它们的相对性和暂时性，不将它们内化为自我评价的唯一标准。\n在目的论主宰的世界里，我们需要刻意创造一些无目的的关系时刻，不为了交换，不为利益，不为任何外在目的，只是纯粹地在一起，纯粹地分享，纯粹地感受彼此的存在。这些时刻就像沙漠中的绿洲，让我们得以暂时逃离异化的逻辑，呼吸到本真关系的空气。\n我们觉得我们需要守护一些无用的情感。在追求效率和价值的时代，那些无法转化为珍珠的眼泪，无法产生效益的情感，无法被量化的温柔，恰恰是最需要守护的。因为它们的存在提醒我们，人之为人的本质，不在于我们能生产多少珍珠，而在于我们能感受多少悲伤、分享多少喜悦、给予多少无条件的爱。\n这部动画最终没有告诉我故事的结局，异化的困境没有简单的解决方案，我们只能在持续的觉察中，不断努力成为自己眼泪的主人，而不是被动的生产者。\n\n眼泪可以是珍珠，但首先应该是眼泪；人可以生产价值，但首先应该是人。在这个万物都被明码标价的时代，最大的反抗或许就是：当我流泪时，我知道自己为何流泪，当我爱时，我知道自己在爱什么。"

      document.getElementById('guestbook-name').placeholder = translations[lang]['guestbook-name-placeholder'];
      document.getElementById('guestbook-message').placeholder = translations[lang]['guestbook-message-placeholder'];
      document.getElementById('guestbook-submit-btn').innerText = translations[lang]['guestbook-submit'];
      document.getElementById('clear-guestbook-btn').innerText = translations[lang]['clear-guestbook'];
      document.getElementById('footer-text').innerText = translations[lang]['footer-text'];
      document.getElementById('back-home-from-settings').innerText = translations[lang]['back-home-from-settings'];
      if (clearDateBtn) clearDateBtn.innerText = translations[lang]['clear-date'];
      // 更新语言按钮激活状态
      document.getElementById('lang-zh').classList.toggle('active', lang === 'zh');
      document.getElementById('lang-en').classList.toggle('active', lang === 'en');
      // 重新渲染标签（标签文本本身不变，但“全部”按钮需要更新）
      renderTags(currentTag);
      // 重新渲染文章列表（确保界面更新）
      renderPosts();
      // 重新渲染日历（星期几等文字？日历星期是中文固定，但可以保持不变，或者以后根据语言切换星期）
    }

    // ----- 切换语言 -----
    window.setLanguage = function(l) {
      if (l === lang) return;
      lang = l;
      posts = lang === 'zh' ? postsZh : postsEn; // 切换文章数据源（内容不变）
      updateUILanguage();
    };

    // ----- 打字机效果函数 -----
    function typeWriter(text, element, speed, callback) {
      let i = 0;
      element.innerHTML = '';
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          if (callback) callback();
        }
      }
      typing();
    }

    // ----- 昵称逻辑 -----
    function showGreetingAndEnter(name) {
      const safeName = name.replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
      modalAsk.classList.add('hidden');
      modalGreeting.classList.remove('hidden');
      const text = `hi, ${safeName}`;
      typeWriter(text, greetingMain, 120, function() {
        greetingSmall.style.display = 'block';
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.classList.add('hidden');
            mainContent.style.display = 'block';
            if (typeof initPetals === 'function') initPetals();
          }, 500);
        }, 1000);
      });
    }

    function handleNicknameSubmit() {
      let name = nicknameInput.value.trim();
      if (name === '') name = '访客';
      sessionStorage.setItem('nickname', name);
      showGreetingAndEnter(name);
    }

    function checkNickname() {
      const savedName = sessionStorage.getItem('nickname');
      if (savedName) {
        overlay.classList.add('hidden');
        mainContent.style.display = 'block';
      } else {
        overlay.classList.remove('hidden');
        overlay.style.opacity = '1';
        modalAsk.classList.remove('hidden');
        modalGreeting.classList.add('hidden');
        mainContent.style.display = 'none';
        nicknameInput.value = '';
        nicknameInput.focus();
      }
    }

    submitBtn.addEventListener('click', handleNicknameSubmit);
    nicknameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleNicknameSubmit();
    });

    // ----- 回到顶部功能 -----
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTop.classList.add('show');
      } else {
        backToTop.classList.remove('show');
      }
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ----- 阅读时间计算 -----
    function calculateReadingTime(text) {
      const plainText = text.replace(/<[^>]*>/g, '');
      const chineseChars = plainText.match(/[\u4e00-\u9fa5]/g) || [];
      const wordCount = chineseChars.length;
      const minutes = Math.max(1, Math.ceil(wordCount / 300));
      return `${translations[lang]['reading-time']}：${minutes} ${translations[lang]['minutes']} · ${wordCount} ${translations[lang]['words']}`;
    }

    // ----- 更新文章列表（增加日期筛选）-----
    function renderPosts() {
      let filtered = posts;
      if (currentTag) {
        filtered = filtered.filter(p => p.tags.includes(currentTag));
      }
      if (searchTerm.trim() !== '') {
        const term = searchTerm.trim().toLowerCase();
        filtered = filtered.filter(p => 
          p.title.toLowerCase().includes(term) || 
          p.excerpt.toLowerCase().includes(term)
        );
      }
      if (currentDate) {
        filtered = filtered.filter(p => p.date === currentDate);
      }

      const html = filtered.map(p => `
        <article class="post-card" onclick='showPostDetail("${p.title.replace(/'/g, "\\'")}")'>
          <div class="post-meta">
            <span class="post-date">${p.date}</span>
            <div class="post-tags">${p.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
          </div>
          <h2 class="post-title">${p.title}</h2>
          <p class="post-excerpt">${p.excerpt.replace(/\n/g, '<br>')}</p>
        </article>
      `).join('') || '<p style="text-align:center; color:var(--text2); padding:2rem;">' + (lang === 'zh' ? '没有找到相关文章' : 'No articles found') + '</p>';

      document.getElementById('posts').innerHTML = html;
      document.getElementById('archivePosts').innerHTML = html;

      if (clearDateBtn) {
        clearDateBtn.style.display = currentDate ? 'block' : 'none';
      }
    }

    // ----- 清除日期筛选 -----
    function clearDateFilter() {
      currentDate = null;
      renderPosts();
      renderCalendar(currentYear, currentMonth);
    }

    // ----- 标签渲染 -----
    function renderTags(activeTag = null) {
      const container = document.getElementById('tagsFilter');
      container.innerHTML = `<span class="tag-filter ${!activeTag ? 'active' : ''}" onclick="filterByTag(null)">${translations[lang]['all']}</span>` +
        allTags.map(tag => `<span class="tag-filter ${activeTag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">${tag}</span>`).join('');
    }

    function filterByTag(tag) {
      currentTag = tag;
      currentDate = null;
      renderTags(tag);
      renderPosts();
      renderCalendar(currentYear, currentMonth);
    }

    // ----- 搜索处理 -----
    function handleSearch(e) {
      const value = e.target.value;
      searchTerm = value;
      syncSearchInputs(value);
      currentDate = null;
      renderPosts();
      renderCalendar(currentYear, currentMonth);
    }

    function syncSearchInputs(value) {
      searchHome.value = value;
      searchArchive.value = value;
      if (value.length > 0) {
        clearHome.style.display = 'block';
        clearArchive.style.display = 'block';
      } else {
        clearHome.style.display = 'none';
        clearArchive.style.display = 'none';
      }
    }

    function clearSearch() {
      searchTerm = '';
      syncSearchInputs('');
      renderPosts();
    }

    // ----- 页面切换 -----
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (pageId === 'home' || pageId === 'archive') {
        lastPage = pageId;
        syncSearchInputs(searchTerm);
        if (pageId === 'archive') {
          renderCalendar(currentYear, currentMonth);
        }
      } else if (pageId === 'settings') {
        // 进入设置页时，刷新留言板显示
        renderGuestbook();
      }
      window.scrollTo(0, 0);
    }

    // ----- 显示文章详情 -----
    function showPostDetail(title) {
      const article = posts.find(p => p.title === title);
      if (!article) return;

      const activePage = document.querySelector('.page.active')?.id;
      if (activePage && activePage !== 'post-detail') {
        lastPage = activePage;
      }

      document.getElementById('detail-date').innerText = article.date;
      document.getElementById('detail-tags').innerHTML = article.tags.map(t => `<span class="post-tag">${t}</span>`).join('');
      document.getElementById('detail-title').innerText = article.title;
      document.getElementById('detail-content').innerHTML = article.excerpt.replace(/\n/g, '<br>');
      
      readingTimeDiv.innerText = calculateReadingTime(article.excerpt);

      const isBraveNewWorld = (article.title === "读书笔记：《美丽新世界》");
      const imgContainer = document.getElementById('detail-image-container');
      imgContainer.style.display = isBraveNewWorld ? 'block' : 'none';

      showPage('post-detail');
    }

    function goBack() {
      showPage(lastPage);
    }

    // ----- 主题切换 -----
    function toggleTheme() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      if (typeof initPetals === 'function') initPetals();
    }

    // ----- 飘落花瓣动画 (Canvas) -----
    const canvas = document.getElementById('petal-canvas');
    let ctx = canvas.getContext('2d');
    let width, height;
    let petals = [];
    const PETAL_COUNT = 35;

    function getPetalColors() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      if (isDark) {
        return ['rgba(180,130,120,0.25)', 'rgba(150,110,100,0.3)', 'rgba(130,90,80,0.2)'];
      } else {
        return ['rgba(255,200,220,0.4)', 'rgba(255,180,200,0.35)', 'rgba(240,160,180,0.3)'];
      }
    }

    function initPetals() {
      petals = [];
      const colors = getPetalColors();
      for (let i = 0; i < PETAL_COUNT; i++) {
        petals.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: 8 + Math.random() * 15,
          speedY: 0.3 + Math.random() * 0.7,
          speedX: 0.1 + Math.random() * 0.3,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.02,
          color: colors[Math.floor(Math.random() * colors.length)],
          swing: Math.random() * 2
        });
      }
    }

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initPetals();
    }

    function drawPetal(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.8, p.size * 0.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.3, p.size * 0.15, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('0.25', '0.4').replace('0.3', '0.5').replace('0.2', '0.3');
      ctx.fill();
      ctx.restore();
    }

    function animatePetals() {
      ctx.clearRect(0, 0, width, height);
      for (let p of petals) {
        p.y += p.speedY;
        p.x += Math.sin(Date.now() * 0.001 + p.swing) * 0.2;
        p.rotation += p.rotSpeed;
        if (p.y > height + 50) {
          p.y = -30;
          p.x = Math.random() * width;
          p.speedY = 0.3 + Math.random() * 0.7;
        }
        if (p.x > width + 50) p.x = -50;
        if (p.x < -50) p.x = width + 50;
        drawPetal(p);
      }
      requestAnimationFrame(animatePetals);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    animatePetals();

    // ----- 归档日历逻辑 -----
    let currentYear = 2026;
    let currentMonth = 2; // 3月

    function renderCalendar(year, month) {
      const container = document.getElementById('calendar-container');
      if (!container) return;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startWeekday = firstDay.getDay();

      const postDates = new Set(posts.map(p => p.date));

      let html = `
        <div class="calendar-header">
          <span>${year}年${month+1}月</span>
          <div class="calendar-nav">
            <span onclick="changeMonth(-1)">←</span>
            <span onclick="changeMonth(1)">→</span>
          </div>
        </div>
        <div class="calendar-weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="calendar-days">
      `;

      for (let i = 0; i < startWeekday; i++) {
        html += '<div class="calendar-day empty"></div>';
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasPost = postDates.has(dateStr);
        const isSelected = (currentDate === dateStr) ? ' selected' : '';
        html += `<div class="calendar-day ${hasPost ? 'has-posts' : ''}${isSelected}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">${d}</div>`;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    window.selectDate = function(dateStr) {
      currentDate = dateStr;
      currentTag = null;
      searchTerm = '';
      syncSearchInputs('');
      renderTags(null);
      renderPosts();
      renderCalendar(currentYear, currentMonth);
    };

    window.changeMonth = function(delta) {
      let newMonth = currentMonth + delta;
      let newYear = currentYear;
      if (newMonth < 0) {
        newMonth = 11;
        newYear--;
      } else if (newMonth > 11) {
        newMonth = 0;
        newYear++;
      }
      if (newYear === 2026 && newMonth >= 0 && newMonth <= 11) {
        currentYear = newYear;
        currentMonth = newMonth;
        renderCalendar(currentYear, currentMonth);
      }
    };

    // ----- 留言板功能 (基于localStorage) -----
    function loadGuestbookMessages() {
      const stored = localStorage.getItem('guestbook_messages');
      return stored ? JSON.parse(stored) : [];
    }

    function saveGuestbookMessages(messages) {
      localStorage.setItem('guestbook_messages', JSON.stringify(messages));
    }

    function renderGuestbook() {
      const listDiv = document.getElementById('guestbook-list');
      const messages = loadGuestbookMessages();
      if (messages.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; color:var(--text2);">暂无留言</p>';
        return;
      }
      const html = messages.reverse().map(msg => `
        <div class="guestbook-item">
          <div class="guestbook-meta">
            <span class="guestbook-name">${escapeHtml(msg.name)}</span>
            <span>${msg.time}</span>
          </div>
          <div class="guestbook-content">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</div>
        </div>
      `).join('');
      listDiv.innerHTML = html;
    }

    function escapeHtml(unsafe) {
      return unsafe.replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    window.addGuestbookMessage = function() {
      const nameInput = document.getElementById('guestbook-name');
      const msgInput = document.getElementById('guestbook-message');
      const name = nameInput.value.trim();
      const content = msgInput.value.trim();
      if (!name || !content) {
        alert('请填写名字和留言');
        return;
      }
      const messages = loadGuestbookMessages();
      messages.push({
        name: name,
        content: content,
        time: new Date().toLocaleString()
      });
      saveGuestbookMessages(messages);
      nameInput.value = '';
      msgInput.value = '';
      renderGuestbook();
    };

    window.clearGuestbook = function() {
      if (confirm('确定清除所有留言吗？')) {
        localStorage.removeItem('guestbook_messages');
        renderGuestbook();
      }
    };

    // ----- 初始化 -----
    (function init() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
        document.body.setAttribute('data-theme', 'dark');
        document.querySelector('.theme-toggle').textContent = '☀️';
      }
      // 初始化语言
      updateUILanguage();
      renderTags();
      renderPosts();

      searchHome.addEventListener('input', handleSearch);
      searchArchive.addEventListener('input', handleSearch);
      clearHome.addEventListener('click', clearSearch);
      clearArchive.addEventListener('click', clearSearch);

      checkNickname();
      // 预加载留言板（但此时设置页可能未显示，等显示时再渲染）
    })();

    // 暴露全局函数
    window.showPage = showPage;
    window.filterByTag = filterByTag;
    window.toggleTheme = toggleTheme;
    window.showPostDetail = showPostDetail;
    window.goBack = goBack;
    window.initPetals = initPetals;
    window.clearDateFilter = clearDateFilter;
  </script>
</body>
</html>
