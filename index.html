<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lumiereva · 日记与沉思</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#faf8f5;--bg2:#f5f2ed;--text:#3d3d3d;--text2:#888;--accent:#d4a373;--pink:#ffe5ec;--dot:#e8d5c4;--white:#fff;--shadow:rgba(0,0,0,0.04);--border:#e8e4de}
    [data-theme="dark"]{--bg:#1a1a1a;--bg2:#252525;--text:#e0e0e0;--text2:#888;--accent:#d4a373;--pink:#3d3538;--dot:#3d3d3d;--white:#2a2a2a;--shadow:rgba(0,0,0,0.3);--border:#3d3d3d}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Zen Maru Gothic',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.8;
      min-height:100vh;
      background-image:radial-gradient(var(--dot)1px,transparent 1px);
      background-size:24px 24px;
      transition:background .3s,color .3s;
      position:relative;
      overflow-x:hidden;
    }
    /* 飘落花瓣 canvas */
    #petal-canvas{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:0;
    }
    /* 确保内容在canvas上层 */
    header, main, footer{
      position:relative;
      z-index:10;
    }
    a{color:inherit;text-decoration:none}
    header{position:fixed;top:0;left:0;right:0;background:rgba(250,248,245,.9);backdrop-filter:blur(12px);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:100;border-bottom:1px solid var(--border);transition:background .3s}
    [data-theme="dark"] header{background:rgba(26,26,26,.9)}
    .logo{font-size:1.5rem;font-weight:400;letter-spacing:.15em;cursor:pointer}
    .logo span{color:var(--accent)}
    nav{display:flex;align-items:center;gap:1.5rem}
    nav a{font-size:.9rem;transition:color .3s;cursor:pointer}
    nav a:hover{color:var(--accent)}
    .theme-toggle{cursor:pointer;font-size:1.2rem;padding:.3rem;border-radius:8px;transition:background .3s}
    .theme-toggle:hover{background:var(--pink)}
    /* 主内容初始隐藏，由弹窗控制显示 */
    #main-content{
      display: none;
    }
    main{max-width:800px;margin:0 auto;padding:8rem 2rem 4rem}
    .hero{text-align:center;margin-bottom:2rem;padding:3rem 1rem;background:var(--white);border-radius:24px;box-shadow:0 4px 24px var(--shadow)}
    .hero-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#e8d5c4);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
    .hero h1{font-size:2rem;font-weight:300;letter-spacing:.2em;margin-bottom:.5rem}
    .hero p{color:var(--text2);font-size:.9rem;letter-spacing:.1em}
    .social-links{display:flex;justify-content:center;gap:1rem;margin-top:1.5rem}
    .social-links a{width:40px;height:40px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;transition:transform .3s,background .3s}
    .social-links a:hover{transform:translateY(-3px);background:var(--pink)}
    /* 搜索框样式 */
    .search-wrapper{
      max-width:400px;
      margin:1.5rem auto 1rem;
      position:relative;
    }
    .search-icon{
      position:absolute;
      left:1.2rem;
      top:50%;
      transform:translateY(-50%);
      font-size:1rem;
      opacity:0.6;
      pointer-events:none;
      color:var(--text2);
    }
    .search-input{
      width:100%;
      padding:0.9rem 1.2rem 0.9rem 3rem;
      border-radius:40px;
      border:1px solid var(--border);
      background:var(--white);
      font-family:'Zen Maru Gothic',sans-serif;
      font-size:0.95rem;
      color:var(--text);
      outline:none;
      transition:box-shadow 0.2s, border-color 0.2s;
      box-shadow:0 2px 8px var(--shadow);
    }
    .search-input:focus{
      border-color:var(--accent);
      box-shadow:0 4px 16px rgba(212,163,115,0.2);
    }
    .search-clear{
      position:absolute;
      right:1rem;
      top:50%;
      transform:translateY(-50%);
      background:none;
      border:none;
      font-size:1.1rem;
      cursor:pointer;
      color:var(--text2);
      padding:0.2rem 0.5rem;
      border-radius:50%;
      transition:background 0.2s;
      line-height:1;
    }
    .search-clear:hover{
      background:var(--pink);
      color:var(--accent);
    }
    .tags-filter{display:flex;flex-wrap:wrap;gap:.5rem;margin:1.5rem 0 2rem;justify-content:center}
    .tag-filter{padding:.4rem 1rem;border-radius:20px;background:var(--bg2);font-size:.8rem;cursor:pointer;transition:all .3s;border:1px solid transparent}
    .tag-filter:hover,.tag-filter.active{background:var(--pink);border-color:var(--accent)}
    .posts{display:flex;flex-direction:column;gap:2rem}
    .post-card{background:var(--white);border-radius:20px;padding:2rem;box-shadow:0 2px 20px var(--shadow);transition:transform .3s,box-shadow .3s;display:block;cursor:pointer}
    .post-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .post-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
    .post-date{font-size:.8rem;color:var(--text2);letter-spacing:.1em}
    .post-tags{display:flex;gap:.5rem}
    .post-tag{font-size:.7rem;padding:.2rem .6rem;border-radius:12px;background:var(--bg2);color:var(--text2)}
    .post-title{font-size:1.4rem;font-weight:400;margin-bottom:.75rem;line-height:1.4}
    .post-excerpt{color:var(--text2);font-size:.95rem;line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;word-break:break-word}
    .archive-link{text-align:center;margin-top:3rem}
    .archive-link a{display:inline-block;padding:.75rem 2rem;border-radius:30px;background:var(--white);color:var(--text);box-shadow:0 2px 12px var(--shadow);transition:all .3s;cursor:pointer}
    .archive-link a:hover{transform:translateY(-2px);box-shadow:0 4px 20px var(--shadow)}
    footer{text-align:center;padding:3rem;color:var(--text2);font-size:.85rem;position:relative;z-index:10}
    footer a{color:var(--accent);cursor:pointer}
    .page{display:none}
    .page.active{display:block}
    /* 详情页专用样式 */
    .detail-image-container{
      width:100%;
      margin-bottom:2rem;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 4px 20px var(--shadow);
    }
    .detail-image-container img{
      width:100%;
      height:auto;
      display:block;
    }
    .back-btn{
      background:none;
      border:none;
      color:var(--accent);
      font-size:0.95rem;
      cursor:pointer;
      margin-bottom:1.5rem;
      display:inline-block;
      padding:0.3rem 1rem 0.3rem 0.5rem;
      border-radius:30px;
      transition:background .3s;
    }
    .back-btn:hover{
      background:var(--pink);
    }
    #detail-content{
      -webkit-line-clamp:unset;
      display:block;
      color:var(--text);
      white-space:pre-line;
    }
    /* 阅读时间样式 */
    .reading-time{
      font-size:0.8rem;
      color:var(--text2);
      margin-top:0.5rem;
      margin-bottom:1rem;
      text-align:right;
      border-bottom:1px dashed var(--border);
      padding-bottom:0.5rem;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .post-card{animation:fadeIn .4s ease-out}

    /* ----- 高级昵称弹窗样式 (淡粉色打字机) ----- */
    #nickname-overlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.3);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:1000;
      transition:opacity 0.5s ease;
    }
    .nickname-modal{
      background:var(--white);
      max-width:420px;
      width:90%;
      padding:2.5rem 2rem;
      border-radius:32px;
      box-shadow:0 25px 50px -12px rgba(0,0,0,0.25);
      text-align:center;
      border:1px solid rgba(255,255,255,0.2);
      animation:modalFloatIn 0.5s ease-out;
    }
    @keyframes modalFloatIn{
      0%{opacity:0;transform:translateY(20px) scale(0.98);}
      100%{opacity:1;transform:translateY(0) scale(1);}
    }
    .nickname-modal h2{
      font-size:1.8rem;
      font-weight:300;
      letter-spacing:0.1em;
      margin-bottom:1rem;
      color:var(--accent);
    }
    .nickname-modal p{
      font-size:0.95rem;
      color:var(--text2);
      margin-bottom:2rem;
      line-height:1.6;
    }
    .nickname-input{
      width:100%;
      padding:1rem 1.2rem;
      border-radius:60px;
      border:1px solid var(--border);
      background:var(--bg2);
      font-family:'Zen Maru Gothic',sans-serif;
      font-size:1rem;
      color:var(--text);
      outline:none;
      transition:box-shadow 0.2s, border-color 0.2s;
      margin-bottom:1.5rem;
      text-align:center;
    }
    .nickname-input:focus{
      border-color:var(--accent);
      box-shadow:0 4px 16px rgba(212,163,115,0.25);
    }
    .nickname-btn{
      background:var(--accent);
      color:white;
      border:none;
      padding:0.9rem 2rem;
      border-radius:60px;
      font-size:1rem;
      font-weight:500;
      letter-spacing:0.1em;
      cursor:pointer;
      transition:transform 0.2s, box-shadow 0.2s, background 0.2s;
      box-shadow:0 8px 20px rgba(212,163,115,0.3);
      width:100%;
    }
    .nickname-btn:hover{
      background:#c38e5a;
      transform:translateY(-2px);
      box-shadow:0 12px 28px rgba(212,163,115,0.4);
    }
    /* 欢迎语区域：淡粉色，大字 */
    .nickname-greeting {
      font-size: 3rem;
      color: #f8a5a5; /* 淡粉色 */
      font-weight: 300;
      line-height: 1.2;
      min-height: 6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .nickname-greeting #greeting-main {
      display: inline-block;
      font-weight: 350;
      letter-spacing: 0.02em;
    }
    .nickname-greeting small {
      font-size: 1.2rem;
      color: var(--text2);
      display: block;
      margin-top: 1rem;
      font-weight: 300;
      opacity: 0.8;
      animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 0.8; transform: translateY(0); }
    }
    [data-theme="dark"] .nickname-greeting {
      color: #f2a2a2; /* 深色模式下保持可见的淡粉 */
    }
    [data-theme="dark"] .nickname-greeting small {
      color: #aaa;
    }
    .hidden{
      display:none !important;
    }

    /* ----- 回到顶部按钮 (右下角) ----- */
    #back-to-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid var(--border);
      box-shadow: 0 4px 12px var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0;
      visibility: hidden;
      z-index: 999;
      color: var(--accent);
      font-size: 1.4rem;
      line-height: 1;
    }
    #back-to-top.show {
      opacity: 0.9;
      visibility: visible;
    }
    #back-to-top:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(212,163,115,0.3);
      background: var(--pink);
    }

    /* ----- 归档日历样式 ----- */
    .calendar-wrapper {
      background: var(--white);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 2px 16px var(--shadow);
    }
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 400;
    }
    .calendar-nav {
      display: flex;
      gap: 1rem;
    }
    .calendar-nav span {
      cursor: pointer;
      color: var(--accent);
      font-size: 1.2rem;
      transition: transform 0.2s;
    }
    .calendar-nav span:hover {
      transform: scale(1.2);
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.8rem;
      color: var(--text2);
      margin-bottom: 0.5rem;
    }
    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-day {
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      background: var(--bg2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }
    .calendar-day.empty {
      background: transparent;
      cursor: default;
    }
    .calendar-day.has-posts {
      background: var(--pink);
      color: var(--accent);
      font-weight: 500;
      border: 1px solid var(--accent);
    }
    .calendar-day.has-posts:hover,
    .calendar-day.selected {
      background: var(--accent);
      color: white;
    }
    .calendar-day:not(.empty):hover {
      background: var(--accent);
      color: white;
    }
    .clear-date-btn {
      display: inline-block;
      margin: 0.5rem 0 1rem;
      font-size: 0.8rem;
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .clear-date-btn:hover {
      color: #c38e5a;
    }
  </style>
</head>
<body>
  <!-- 飘落花瓣 canvas (动态元素) -->
  <canvas id="petal-canvas"></canvas>

  <!-- 昵称弹窗 (始终存在，通过JS控制显示/隐藏) -->
  <div id="nickname-overlay">
    <div class="nickname-modal" id="nickname-modal-card">
      <!-- 初始状态：提问 + 输入框 + 按钮 -->
      <div id="modal-ask">
        <h2>✨ 我应该怎么称呼你？</h2>
        <p>What should I call you?</p>
        <input type="text" id="nickname-input-field" class="nickname-input" placeholder="你的名字 / Your name" autofocus>
        <button class="nickname-btn" id="nickname-submit">开始 / Enter</button>
      </div>
      <!-- 欢迎状态：隐藏上述，显示打字机欢迎语 (淡粉色大字) -->
      <div id="modal-greeting" class="hidden">
        <div class="nickname-greeting">
          <span id="greeting-main"></span>
          <small id="greeting-small" style="display: none;">欢迎</small>
        </div>
      </div>
    </div>
  </div>

  <!-- 回到顶部按钮 -->
  <div id="back-to-top" title="回到顶部">↑</div>

  <!-- 主内容（初始隐藏） -->
  <div id="main-content">
    <header>
      <a class="logo" onclick="showPage('home')">lumiere<span>va</span></a>
      <nav>
        <a onclick="showPage('home')">首页</a>
        <a onclick="showPage('archive')">归档</a>
        <span class="theme-toggle" onclick="toggleTheme()">🌙</span>
      </nav>
    </header>
    <main>
      <!-- 首页 -->
      <div id="home" class="page active">
        <div class="hero">
          <div class="hero-avatar">✨</div>
          <h1>lumiereva</h1>
          <p>记录生活的闪光时刻</p>
          <div class="social-links">
            <a href="#" title="GitHub">🐙</a>
            <a href="#" title="Twitter">🐦</a>
            <a href="mailto:hello@lumiereva.com" title="Email">✉️</a>
          </div>
        </div>
        <!-- 首页搜索框 -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-home" placeholder="搜索文章...">
          <button class="search-clear" id="clear-home" style="display:none;">✕</button>
        </div>
        <div class="tags-filter" id="tagsFilter"></div>
        <div class="posts" id="posts"></div>
        <div class="archive-link">
          <a onclick="showPage('archive')">📅 查看全部文章</a>
        </div>
      </div>
      <!-- 归档页 -->
      <div id="archive" class="page">
        <h2 style="text-align:center;margin-bottom:2rem;font-weight:300;letter-spacing:.1em">📚 所有文章</h2>
        <!-- 归档日历容器 -->
        <div id="calendar-container" class="calendar-wrapper"></div>
        <!-- 清除日期筛选按钮（隐藏） -->
        <div id="clear-date-btn" class="clear-date-btn" style="display:none;" onclick="clearDateFilter()">✕ 清除日期筛选</div>
        <!-- 归档搜索框 -->
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-archive" placeholder="搜索文章...">
          <button class="search-clear" id="clear-archive" style="display:none;">✕</button>
        </div>
        <div class="posts" id="archivePosts"></div>
        <div style="text-align:center;margin-top:2rem">
          <a onclick="showPage('home')">← 返回首页</a>
        </div>
      </div>
      <!-- 文章详情页 -->
      <div id="post-detail" class="page">
        <div style="max-width:800px; margin:0 auto;">
          <button class="back-btn" id="detail-backBtn" onclick="goBack()">← 返回</button>
          <div id="detail-image-container" class="detail-image-container" style="display: none;">
            <img src="https://i.imgur.com/7XZ8Q0H.jpg" alt="美丽新世界插画 · 机械与玫瑰">
          </div>
          <div class="post-card" style="padding:2rem; cursor:default;">
            <div class="post-meta">
              <span class="post-date" id="detail-date"></span>
              <div class="post-tags" id="detail-tags"></div>
            </div>
            <h2 class="post-title" id="detail-title"></h2>
            <!-- 阅读时间显示区 -->
            <div id="reading-time" class="reading-time"></div>
            <div class="post-excerpt" id="detail-content"></div>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>© 2026 <a onclick="showPage('home')">lumiereva</a> · 用心记录每一天</p>
    </footer>
  </div>

  <script>
    // ----- 文章数据（修正了日期格式）-----
    const posts = [
      {title:"今天天气真好",date:"2026-03-15",tags:["日常"],excerpt:"阳光明媚，适合出门散步。"},
      {title:"学习新技能的第二天",date:"2026-03-14",tags:["学习","成长"],excerpt:"今天学会了如何使用 GitHub Pages，建立了自己的博客。"},
      {title:"关于未来的一些思考",date:"2026-03-13",tags:["思考"],excerpt:"人生总是充满选择，重要的是勇敢迈出第一步。"},
      {title:"一部好看的电影推荐",date:"2026-03-12",tags:["推荐","电影"],excerpt:"最近看了一部很棒的电影，讲述了一个关于梦想的故事。"},
      {title:"美食记录：自制提拉米苏",date:"2026-03-04",tags:["美食"],excerpt:"第n次尝试做甜品，虽然卖相一般但味道还不错！"}, // 修正为04
      {title:"春天的味道",date:"2026-03-10",tags:["日常","季节"],excerpt:"春天来了，万物复苏，花儿都开了。"},
      {
        title:"读书笔记：《美丽新世界》",
        date:"2026-03-09",
        tags:["阅读"],
        excerpt: "说实话，重读《美丽新世界》时，我常有种恍惚感。赫胥黎1932年写下的这部“反乌托邦”，如今读来却像一本关于当下的纪实文学。只是那些预言换了套更温和的皮囊，悄悄渗透进我们的日常。\n\n你看新世界里的“阶层设定”——阿尔法、贝塔、伽玛、德尔塔，从试管里就被决定了命运。这听起来遥远吗？可看看我们身边：从幼儿园开始的“不要输在起跑线上”，到学区房、补习班、各种素质教育的包装，不正是另一种版本的“预设命运”吗？只是我们不再用化学方法，而是用教育资源的不公、家庭背景的差异，悄然完成着同样的分流。更可怕的是，这套机制运行得如此顺滑，以至于处在底层的孩子，也常常真心相信自己“不是读书的料”，像极了新世界里那些热爱自己搬运工作的德尔塔。\n\n再说说“索麻”。新世界里的人们遇到任何不快，就吞下一片索麻，立刻神清气爽。我们呢？emo了，刷两个小时短视频；焦虑了，打开购物app下一单；空虚了，找个综艺哈哈哈。那些算法精准推送的内容，那些设计得让人上瘾的游戏，那些永远买不完的“种草好物”，不就是我们这个时代的索麻吗？它们同样高效，同样无副作用（表面上看），同样能让你快速逃离负面情绪。只是当你放下手机，那种更深的空洞感，那种说不清的焦虑，是不是比之前更加汹涌？\n\n新世界里“每个人都属于所有人”，爱情被消解为即时满足的肉体游戏。这种景象，在今天的约会文化和社交媒体上，似乎正在加速上演。左滑右滑的速配，三天确定关系的“快餐爱情”，朋友圈里精心修饰的“幸福人设”。我们拥有了前所未有的社交广度，却可能正在失去爱的深度——那种需要时间、需要忍耐、需要为一个人难过流泪的能力。我常问年轻的学生：你还愿意为喜欢的人等待吗？你还愿意经历那种不确定的煎熬吗？大部分人摇头。不是他们不想，是这个时代已经不太允许“低效率”的情感投入了。\n\n还有消费主义对灵魂的殖民。新世界里的人们被不断灌输：消费就是幸福，更新换代就是进步。这不就是我们今天的双十一、618，和那些永远在催促你“对自己好一点”的广告吗？商家不仅卖给你商品，还卖给你一种身份认同——你喝什么咖啡，穿什么牌子，用什么手机，都在定义“你是谁”。于是我们不停地买，不停地换，好像拥有了更多，却在某个深夜突然发现，自己已经很久没有为什么事情真正感动过了。\n\n写这些，不是为了批判什么。作为大学教授，我也在用智能手机，也在刷短视频，也会在疲惫时用娱乐放松自己。赫胥黎的伟大，不在于他提供了某种道德高地让我们俯视众生，而在于他提醒我们：当一种生活方式让人失去感受痛苦的能力，它同时也让人失去了感受深刻的能力。\n\n我想起课堂上一个学生问：“老师，如果快乐很容易得到，我们为什么还要选择艰难？”这是个好问题。我的回答是：因为那些需要付出代价才能获得的东西——真正的爱、深刻的思考、持久的创造——恰恰是定义我们为“人”的东西。快乐可以是目的，但不应该是唯一目的。\n\n新世界里的人们从未真正痛苦过，所以他们也不知道什么是真正的幸福。他们只有愉悦，没有喜悦；只有满足，没有充盈。就像一幅画只有亮色，最终留下的是一片苍白。\n\n所以，当我们享受着科技带来的便利，消费带来的快感，娱乐带来的轻松时，或许可以偶尔停下来，问问自己：我是不是正在为了舒适，悄悄交出什么更重要的东西？比如感受的深度，比如思考的能力，比如那种即使痛苦也要真实的勇气。\n\n赫胥黎的警示，在今天显得尤为珍贵。不是因为他预言了一个可怕的世界，而是因为他让我们看见，那个世界可能正披着“美好生活”的外衣，一点一点成为我们的日常。而对抗它的方式，也许只是保持一份清醒——清醒地选择自己的痛苦，清醒地承受生活的重量，清醒地爱，清醒地活。\n\n这听起来不够轻松，甚至有些沉重。但你知道吗？能够感到沉重的人，至少还没有被彻底麻醉。"
      }
    ];

    // ----- 全局变量 -----
    const allTags = [...new Set(posts.flatMap(p => p.tags))];
    let currentTag = null;          // 当前选中的标签
    let searchTerm = '';            // 当前搜索词
    let lastPage = 'home';          // 返回用
    let currentDate = null;         // 新增：当前筛选的日期 (YYYY-MM-DD)

    // DOM 元素
    const searchHome = document.getElementById('search-home');
    const searchArchive = document.getElementById('search-archive');
    const clearHome = document.getElementById('clear-home');
    const clearArchive = document.getElementById('clear-archive');
    const backToTop = document.getElementById('back-to-top');
    const readingTimeDiv = document.getElementById('reading-time');
    const clearDateBtn = document.getElementById('clear-date-btn');

    // 昵称弹窗元素
    const overlay = document.getElementById('nickname-overlay');
    const modalAsk = document.getElementById('modal-ask');
    const modalGreeting = document.getElementById('modal-greeting');
    const greetingMain = document.getElementById('greeting-main');
    const greetingSmall = document.getElementById('greeting-small');
    const nicknameInput = document.getElementById('nickname-input-field');
    const submitBtn = document.getElementById('nickname-submit');
    const mainContent = document.getElementById('main-content');

    // ----- 打字机效果函数 -----
    function typeWriter(text, element, speed, callback) {
      let i = 0;
      element.innerHTML = ''; // 清空
      function typing() {
        if (i < text.length) {
          element.innerHTML += text.charAt(i);
          i++;
          setTimeout(typing, speed);
        } else {
          if (callback) callback();
        }
      }
      typing();
    }

    // ----- 昵称逻辑 -----
    function showGreetingAndEnter(name) {
      const safeName = name.replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
      modalAsk.classList.add('hidden');
      modalGreeting.classList.remove('hidden');
      const text = `hi, ${safeName}`;
      typeWriter(text, greetingMain, 120, function() {
        greetingSmall.style.display = 'block';
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => {
            overlay.classList.add('hidden');
            mainContent.style.display = 'block';
            if (typeof initPetals === 'function') initPetals();
          }, 500);
        }, 1000);
      });
    }

    function handleNicknameSubmit() {
      let name = nicknameInput.value.trim();
      if (name === '') name = '访客';
      sessionStorage.setItem('nickname', name);
      showGreetingAndEnter(name);
    }

    function checkNickname() {
      const savedName = sessionStorage.getItem('nickname');
      if (savedName) {
        overlay.classList.add('hidden');
        mainContent.style.display = 'block';
      } else {
        overlay.classList.remove('hidden');
        overlay.style.opacity = '1';
        modalAsk.classList.remove('hidden');
        modalGreeting.classList.add('hidden');
        mainContent.style.display = 'none';
        nicknameInput.value = '';
        nicknameInput.focus();
      }
    }

    submitBtn.addEventListener('click', handleNicknameSubmit);
    nicknameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleNicknameSubmit();
    });

    // ----- 回到顶部功能 -----
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        backToTop.classList.add('show');
      } else {
        backToTop.classList.remove('show');
      }
    });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // ----- 阅读时间计算 -----
    function calculateReadingTime(text) {
      // 去除HTML标签，统计中文字符数（粗略）
      const plainText = text.replace(/<[^>]*>/g, '');
      const chineseChars = plainText.match(/[\u4e00-\u9fa5]/g) || [];
      const wordCount = chineseChars.length;
      const minutes = Math.max(1, Math.ceil(wordCount / 300));
      return `预计阅读时间：${minutes} 分钟 · ${wordCount} 字`;
    }

    // ----- 更新文章列表（增加日期筛选）-----
    function renderPosts() {
      let filtered = posts;
      if (currentTag) {
        filtered = filtered.filter(p => p.tags.includes(currentTag));
      }
      if (searchTerm.trim() !== '') {
        const term = searchTerm.trim().toLowerCase();
        filtered = filtered.filter(p => 
          p.title.toLowerCase().includes(term) || 
          p.excerpt.toLowerCase().includes(term)
        );
      }
      if (currentDate) {
        filtered = filtered.filter(p => p.date === currentDate);
      }

      const html = filtered.map(p => `
        <article class="post-card" onclick='showPostDetail("${p.title.replace(/'/g, "\\'")}")'>
          <div class="post-meta">
            <span class="post-date">${p.date}</span>
            <div class="post-tags">${p.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
          </div>
          <h2 class="post-title">${p.title}</h2>
          <p class="post-excerpt">${p.excerpt.replace(/\n/g, '<br>')}</p>
        </article>
      `).join('') || '<p style="text-align:center; color:var(--text2); padding:2rem;">没有找到相关文章</p>';

      document.getElementById('posts').innerHTML = html;
      document.getElementById('archivePosts').innerHTML = html;

      // 控制清除日期按钮显示
      if (clearDateBtn) {
        clearDateBtn.style.display = currentDate ? 'block' : 'none';
      }
    }

    // ----- 清除日期筛选 -----
    function clearDateFilter() {
      currentDate = null;
      renderPosts();
      // 更新日历高亮
      renderCalendar(currentYear, currentMonth);
    }

    // ----- 标签渲染 -----
    function renderTags(activeTag = null) {
      const container = document.getElementById('tagsFilter');
      container.innerHTML = `<span class="tag-filter ${!activeTag ? 'active' : ''}" onclick="filterByTag(null)">全部</span>` +
        allTags.map(tag => `<span class="tag-filter ${activeTag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">${tag}</span>`).join('');
    }

    function filterByTag(tag) {
      currentTag = tag;
      currentDate = null; // 切换标签时清除日期筛选
      renderTags(tag);
      renderPosts();
      renderCalendar(currentYear, currentMonth); // 刷新日历高亮
    }

    // ----- 搜索处理 -----
    function handleSearch(e) {
      const value = e.target.value;
      searchTerm = value;
      syncSearchInputs(value);
      currentDate = null; // 搜索时清除日期筛选
      renderPosts();
      renderCalendar(currentYear, currentMonth);
    }

    function syncSearchInputs(value) {
      searchHome.value = value;
      searchArchive.value = value;
      if (value.length > 0) {
        clearHome.style.display = 'block';
        clearArchive.style.display = 'block';
      } else {
        clearHome.style.display = 'none';
        clearArchive.style.display = 'none';
      }
    }

    function clearSearch() {
      searchTerm = '';
      syncSearchInputs('');
      renderPosts();
    }

    // ----- 页面切换 -----
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (pageId === 'home' || pageId === 'archive') {
        lastPage = pageId;
        syncSearchInputs(searchTerm);
        // 如果进入归档页，渲染日历
        if (pageId === 'archive') {
          renderCalendar(currentYear, currentMonth);
        }
      }
      window.scrollTo(0, 0);
    }

    // ----- 显示文章详情 -----
    function showPostDetail(title) {
      const article = posts.find(p => p.title === title);
      if (!article) return;

      const activePage = document.querySelector('.page.active')?.id;
      if (activePage && activePage !== 'post-detail') {
        lastPage = activePage;
      }

      document.getElementById('detail-date').innerText = article.date;
      document.getElementById('detail-tags').innerHTML = article.tags.map(t => `<span class="post-tag">${t}</span>`).join('');
      document.getElementById('detail-title').innerText = article.title;
      document.getElementById('detail-content').innerHTML = article.excerpt.replace(/\n/g, '<br>');
      
      // 显示阅读时间
      readingTimeDiv.innerText = calculateReadingTime(article.excerpt);

      const isBraveNewWorld = (article.title === "读书笔记：《美丽新世界》");
      const imgContainer = document.getElementById('detail-image-container');
      imgContainer.style.display = isBraveNewWorld ? 'block' : 'none';

      showPage('post-detail');
    }

    function goBack() {
      showPage(lastPage);
    }

    // ----- 主题切换 -----
    function toggleTheme() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      if (typeof initPetals === 'function') initPetals();
    }

    // ----- 飘落花瓣动画 (Canvas) -----
    const canvas = document.getElementById('petal-canvas');
    let ctx = canvas.getContext('2d');
    let width, height;
    let petals = [];
    const PETAL_COUNT = 35;

    function getPetalColors() {
      const isDark = document.body.getAttribute('data-theme') === 'dark';
      if (isDark) {
        return ['rgba(180,130,120,0.25)', 'rgba(150,110,100,0.3)', 'rgba(130,90,80,0.2)'];
      } else {
        return ['rgba(255,200,220,0.4)', 'rgba(255,180,200,0.35)', 'rgba(240,160,180,0.3)'];
      }
    }

    function initPetals() {
      petals = [];
      const colors = getPetalColors();
      for (let i = 0; i < PETAL_COUNT; i++) {
        petals.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: 8 + Math.random() * 15,
          speedY: 0.3 + Math.random() * 0.7,
          speedX: 0.1 + Math.random() * 0.3,
          rotation: Math.random() * Math.PI * 2,
          rotSpeed: (Math.random() - 0.5) * 0.02,
          color: colors[Math.floor(Math.random() * colors.length)],
          swing: Math.random() * 2
        });
      }
    }

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initPetals();
    }

    function drawPetal(p) {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.8, p.size * 0.4, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.3, p.size * 0.15, 0, 0, Math.PI * 2);
      ctx.fillStyle = p.color.replace('0.25', '0.4').replace('0.3', '0.5').replace('0.2', '0.3');
      ctx.fill();
      ctx.restore();
    }

    function animatePetals() {
      ctx.clearRect(0, 0, width, height);
      for (let p of petals) {
        p.y += p.speedY;
        p.x += Math.sin(Date.now() * 0.001 + p.swing) * 0.2;
        p.rotation += p.rotSpeed;
        if (p.y > height + 50) {
          p.y = -30;
          p.x = Math.random() * width;
          p.speedY = 0.3 + Math.random() * 0.7;
        }
        if (p.x > width + 50) p.x = -50;
        if (p.x < -50) p.x = width + 50;
        drawPetal(p);
      }
      requestAnimationFrame(animatePetals);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    animatePetals();

    // ----- 归档日历逻辑 -----
    let currentYear = 2026;
    let currentMonth = 2; // 0-index, 3月

    function renderCalendar(year, month) {
      const container = document.getElementById('calendar-container');
      if (!container) return;

      // 获取该月第一天和最后一天
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startWeekday = firstDay.getDay(); // 0 = 周日

      // 构建日期集合 (用于高亮)
      const postDates = new Set(posts.map(p => p.date));

      let html = `
        <div class="calendar-header">
          <span>${year}年${month+1}月</span>
          <div class="calendar-nav">
            <span onclick="changeMonth(-1)">←</span>
            <span onclick="changeMonth(1)">→</span>
          </div>
        </div>
        <div class="calendar-weekdays">
          <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
        </div>
        <div class="calendar-days">
      `;

      // 填充空白
      for (let i = 0; i < startWeekday; i++) {
        html += '<div class="calendar-day empty"></div>';
      }

      // 填充日期
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasPost = postDates.has(dateStr);
        const isSelected = (currentDate === dateStr) ? ' selected' : '';
        html += `<div class="calendar-day ${hasPost ? 'has-posts' : ''}${isSelected}" data-date="${dateStr}" onclick="selectDate('${dateStr}')">${d}</div>`;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    // 选择日期
    window.selectDate = function(dateStr) {
      currentDate = dateStr;
      currentTag = null; // 清除标签筛选
      searchTerm = '';   // 清除搜索
      syncSearchInputs('');
      renderTags(null);
      renderPosts();
      renderCalendar(currentYear, currentMonth); // 更新高亮
    };

    // 改变月份
    window.changeMonth = function(delta) {
      let newMonth = currentMonth + delta;
      let newYear = currentYear;
      if (newMonth < 0) {
        newMonth = 11;
        newYear--;
      } else if (newMonth > 11) {
        newMonth = 0;
        newYear++;
      }
      // 简单起见，只允许2026年范围
      if (newYear === 2026 && newMonth >= 0 && newMonth <= 11) {
        currentYear = newYear;
        currentMonth = newMonth;
        renderCalendar(currentYear, currentMonth);
      }
    };

    // ----- 初始化 -----
    (function init() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
        document.body.setAttribute('data-theme', 'dark');
        document.querySelector('.theme-toggle').textContent = '☀️';
      }
      renderTags();
      renderPosts();

      searchHome.addEventListener('input', handleSearch);
      searchArchive.addEventListener('input', handleSearch);
      clearHome.addEventListener('click', clearSearch);
      clearArchive.addEventListener('click', clearSearch);

      checkNickname();
    })();

    // 暴露全局函数
    window.showPage = showPage;
    window.filterByTag = filterByTag;
    window.toggleTheme = toggleTheme;
    window.showPostDetail = showPostDetail;
    window.goBack = goBack;
    window.initPetals = initPetals;
    window.clearDateFilter = clearDateFilter;
  </script>
</body>
</html>
