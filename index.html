<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>lumiereva 的日记</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f5;--text:#3d3d3d;--accent:#d4a373;--pink:#ffe5ec;--dot:#e8d5c4;--white:#fff}*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;min-height:100vh;background-image:radial-gradient(var(--dot)1px,transparent 1px);background-size:24px 24px}
header{position:fixed;top:0;left:0;right:0;background:rgba(250,248,245,.9);backdrop-filter:blur(10px);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;z-index:100;border-bottom:1px solid var(--dot)}
.logo{font-size:1.4rem;font-weight:500;letter-spacing:.1em;color:var(--text);text-decoration:none}
nav a{margin-left:2rem;text-decoration:none;color:var(--text);font-size:.9rem}nav a:hover{color:var(--accent)}
main{max-width:720px;margin:0 auto;padding:8rem 2rem 4rem}
.hero{text-align:center;margin-bottom:4rem}.hero h1{font-size:2.5rem;font-weight:300;letter-spacing:.2em;margin-bottom:.5rem}.hero p{color:#888;font-size:.9rem;letter-spacing:.1em}
.posts{display:flex;flex-direction:column;gap:3rem}
.post-card{background:var(--white);border-radius:16px;padding:2rem;box-shadow:0 2px 20px rgba(0,0,0,.04);transition:transform .3s;text-decoration:none;color:inherit;display:block}.post-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.post-date{font-size:.8rem;color:#999;letter-spacing:.1em;margin-bottom:.5rem}.post-title{font-size:1.5rem;font-weight:400;margin-bottom:.75rem}.post-excerpt{color:#666;font-size:.95rem}
.post-tags{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}.tag{background:var(--pink);padding:.25rem .75rem;border-radius:20px;font-size:.75rem}
.post-detail{background:var(--white);border-radius:16px;padding:3rem;box-shadow:0 2px 20px rgba(0,0,0,.04)}.post-detail .post-title{text-align:center;font-size:2rem}
.post-content{font-size:1rem;line-height:2}.post-content p{margin-bottom:1.5rem}.post-content img{max-width:100%;border-radius:12px;margin:1.5rem 0}
.back-link{display:inline-block;margin-top:2rem;color:var(--accent);text-decoration:none}
footer{text-align:center;padding:3rem;color:#999;font-size:.8rem}
.about-section{background:var(--white);border-radius:16px;padding:3rem;text-align:center}
.about-avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#ccd5ae);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-size:3rem}
@media(max-width:600px){main{padding:6rem 1rem 3rem}.post-card{padding:1.5rem}}
</style></head>
<body>
<header><a href="/" class="logo">lumiereva</a><nav><a href="/">日记</a><a href="/about.html">关于</a></nav></header>
<main id="content"></main>
<footer><p>© 2026 lumiereva · 用心记录每一天</p></footer>
<script>
const posts=[{id:1,date:"2026-03-15",title:"春天的第一个晴天",excerpt:"终于等到好天气，出门散步遇到了盛开的樱花...",content:"终于等到好天气，出门散步遇到了盛开的樱花。\n\n![樱花](https://images.unsplash.com/photo-1522383225653-ed111181a951?w=800)\n\n春天的阳光总是让人心情愉悦。",tags:["日记","春天"]},{id:2,date:"2026-03-10",title:"关于咖啡的二三事",excerpt:"最近开始学习手冲咖啡...",content:"最近开始学习手冲咖啡，发现比想象中更有趣。\n\n![咖啡](https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=800)",tags:["咖啡"]}];
const path=window.location.pathname,c=document.getElementById('content');
if(path==='/'||path==='/index.html'){let h='<div class="hero"><h1>lumiereva</h1><p>日常 · 思考 · 记录</p></div><div class="posts">';posts.forEach(p=>{h+=<a href="/post/${p.id}.html" class="post-card"><div class="post-date">${p.date}</div><h2 class="post-title">${p.title}</h2><p class="post-excerpt">${p.excerpt}</p><div class="post-tags">${p.tags.map(t=><span class="tag">${t}</span>).join('')}</div></a>});h+='</div>';c.innerHTML=h;}
else if(path==='/about.html'){c.innerHTML='<div class="about-section"><div class="about-avatar">✿</div><h1>你好，我是 lumiereva</h1><p>一个喜欢记录生活的人。</p></div>';}
else if(path.startsWith('/post/')){const id=parseInt(path.match(/\/post\/(\d+).html/)[1]),post=posts.find(p=>p.id===id);if(post){const cnt=post.content.replace(/\n\n/g,'</p><p>').replace(/![([^]]*)](([^)]+))/g,'<img src="$2">');c.innerHTML=<div class="post-detail"><div class="post-date">${post.date}</div><h1 class="post-title">${post.title}</h1><div class="post-content"><p>${cnt}</p></div><div class="post-tags">${post.tags.map(t=><span class="tag">${t}</span>).join('')}</div><a href="/" class="back-link">← 返回</a></div>;}else c.innerHTML='<p>文章未找到</p>'}
</script></body></html>
